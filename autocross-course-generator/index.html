<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1,viewport-fit=cover">
<meta name="theme-color" content="#111827">
<title>ApexCourse Lab — Autocross Course Generator</title>
<style>
html,body{height:100%;margin:0;background:#111827;color:#fff;font-family:system-ui,-apple-system,BlinkMacSystemFont,"Segoe UI",sans-serif}main{min-height:100%;display:grid;place-items:center;padding:24px;text-align:center;box-sizing:border-box}.spinner{width:38px;height:38px;margin:0 auto 16px;border:4px solid rgba(255,255,255,.25);border-top-color:#fff;border-radius:50%;animation:s .8s linear infinite}@keyframes s{to{transform:rotate(360deg)}}small{display:block;opacity:.7;margin-top:10px;max-width:320px}
</style>
</head>
<body>
<main id="loading"><div><div class="spinner"></div><strong>Loading ApexCourse Lab…</strong><small>Preparing the course planner on your device.</small></div></main>
<script>
function decodeBase64(value){const raw=atob(value.replace(/\s/g,''));const bytes=new Uint8Array(raw.length);for(let i=0;i<raw.length;i++)bytes[i]=raw.charCodeAt(i);return bytes}
function loadScript(src){return new Promise((resolve,reject)=>{const s=document.createElement('script');s.src=src;s.onload=resolve;s.onerror=reject;document.head.appendChild(s)})}
async function start(){const response=await fetch('./payload.txt',{cache:'no-store'});if(!response.ok)throw new Error('Application payload could not be loaded.');const compressed=decodeBase64(await response.text());let html;if('DecompressionStream' in window){const stream=new Blob([compressed]).stream().pipeThrough(new DecompressionStream('gzip'));html=await new Response(stream).text()}else{await loadScript('https://cdn.jsdelivr.net/npm/pako@2.1.0/dist/pako.min.js');html=new TextDecoder().decode(window.pako.ungzip(compressed))}document.open();document.write(html);document.close()}
start().catch(error=>{console.error(error);document.getElementById('loading').innerHTML='<div><strong>Unable to load the planner.</strong><small>Check your internet connection, then refresh the page.</small></div>'});
</script>
</body>
</html>
